<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyer Dashboard - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>console.warn = function() {};</script>
</head>
  <nav class="bg-green-600 dark:bg-gray-900 text-white py-4 sticky top-0 z-50 transition-colors">
  <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-store text-3xl"></i>
      <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
    </div>

    <!-- Dark Mode Toggle -->
    <button onclick="toggleDarkMode()" 
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition">
      <i id="themeIcon" class="fa-solid fa-moon text-xl"></i>
    </button>
  </div>
</nav>
<body class="bg-gray-50 font-sans">

  <!-- Top Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input type="text" id="searchInput" 
                 onkeyup="performSearch()"
                 class="w-full px-5 py-3 rounded-full border-0 focus:outline-none text-gray-800 placeholder-gray-400" 
                 placeholder="Search phones, furniture, shoes, clothes, location...">
          <button onclick="performSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-green-600">
            <i class="fa-solid fa-magnifying-glass text-xl"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <a href="buyer-messages.html" class="hover:text-yellow-300"><i class="fa-solid fa-message text-xl"></i></a>
        <a href="my-orders.html" class="hover:text-yellow-300"><i class="fa-solid fa-bag-shopping text-xl"></i></a>
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleProfileMenu()">
          <div class="w-9 h-9 bg-white text-green-600 rounded-full flex items-center justify-center font-bold">JM</div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8 flex gap-8">
    <!-- Sidebar (same as before) -->
    <div class="w-64 bg-white rounded-3xl shadow p-6 h-fit sticky top-24">
      <!-- Sidebar content same as previous version -->
      <div class="space-y-6">
        <a href="buyer-dashboard.html" class="flex items-center gap-3 text-green-600 font-semibold"><i class="fa-solid fa-house"></i> Home</a>
        <a href="#" class="flex items-center gap-3 hover:text-green-600 transition"><i class="fa-solid fa-th-large"></i> Categories</a>
        <a href="my-orders.html" class="flex items-center gap-3 hover:text-green-600 transition"><i class="fa-solid fa-bag-shopping"></i> My Orders</a>
        <a href="buyer-messages.html" class="flex items-center gap-3 hover:text-green-600 transition"><i class="fa-solid fa-message"></i> Messages</a>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1">
      <h1 class="text-3xl font-bold mb-2">Welcome back, John 👋</h1>
      <p class="text-gray-600 mb-8">Discover great deals across Uganda</p>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="productGrid"></div>
    </div>
  </div>

  <script>
    let allProducts = [
      { title: "iPhone 13 - 128GB", price: 1200000, location: "Kampala - Kisaasi", trader: "Mukisa Electronics", image: "📱" },
      { title: "Samsung Galaxy A54", price: 850000, location: "Kampala - Downtown", trader: "Mukisa Electronics", image: "📱" },
      { title: "Wooden Dining Table", price: 450000, location: "Gulu Town", trader: "Mama Sarah Furniture", image: "🪑" },
      { title: "Nike Air Force 1", price: 180000, location: "Mbarara", trader: "Trendy Shoes UG", image: "👟" },
      { title: "Fresh Tomatoes 50kg", price: 120000, location: "Gulu Town", trader: "Mama Sarah Sales", image: "🍅" },
      { title: "Ladies Handbags", price: 65000, location: "Kampala - Kisaasi", trader: "Mama Sarah Sales", image: "👜" }
    ];

    function createProductCard(product) {
      const card = document.createElement('div');
      card.className = "bg-white rounded-3xl shadow hover:shadow-xl transition overflow-hidden cursor-pointer";
      card.innerHTML = `
        <div class="h-48 bg-gray-100 flex items-center justify-center text-7xl border-b">${product.image}</div>
        <div class="p-5">
          <h3 class="font-semibold text-lg">${product.title}</h3>
          <p class="text-green-600 font-bold text-xl">UGX ${product.price.toLocaleString()}</p>
          <p class="text-sm text-gray-500 mt-1">${product.location}</p>
          <p class="text-xs text-gray-400 mt-3">Seller: ${product.trader}</p>
          
          <div class="mt-5 flex gap-3">
            <button onclick="contactSeller('${product.trader}'); event.stopImmediatePropagation()" 
                    class="flex-1 bg-green-600 text-white py-3 rounded-2xl hover:bg-green-700 text-sm font-medium">
              WhatsApp
            </button>
            <button onclick="viewProduct('${product.title}'); event.stopImmediatePropagation()" 
                    class="flex-1 border border-gray-300 py-3 rounded-2xl hover:bg-gray-50 text-sm">
              View
            </button>
          </div>
        </div>
      `;
      return card;
    }

    function renderProducts(filteredProducts) {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      filteredProducts.forEach(product => {
        grid.appendChild(createProductCard(product));
      });
    }

    function performSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      
      if (!query) {
        renderProducts(allProducts);
        return;
      }

      const filtered = allProducts.filter(product => 
        product.title.toLowerCase().includes(query) ||
        product.location.toLowerCase().includes(query) ||
        product.trader.toLowerCase().includes(query) ||
        product.price.toString().includes(query)
      );

      renderProducts(filtered);
    }

    function contactSeller(trader) {
      alert(`✅ Connecting to ${trader} via WhatsApp...`);
    }

    function viewProduct(title) {
      alert(`Opening details for: ${title}`);
      // window.location.href = 'product-detail.html';
    }

    function toggleProfileMenu() {
      alert("Account Menu:\n• Profile\n• My Orders\n• Logout");
    }

    // Initialize
    window.onload = () => {
      renderProducts(allProducts);
    };
  </script>
</body>
</html>
