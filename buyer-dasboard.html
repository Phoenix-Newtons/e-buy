<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="index.html" class="hover:underline">Home</a>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold">Login</h2>
        <p class="text-gray-600 mt-2">Enter your MTN or Airtel number</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-1">Phone Number</label>
          <div class="flex gap-2">
            <select id="countryCode" class="px-4 py-3 border border-gray-300 rounded-2xl w-28 bg-gray-50">
              <option>+256</option>
            </select>
            <input type="tel" id="phone" required placeholder="700 123 456"
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500">
          </div>
        </div>

        <button type="submit" id="loginBtn"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition">
          Send OTP via SMS
        </button>
      </form>
    </div>
  </div>

  <script>
    // Configuration constants[span_2](start_span)[span_2](end_span)
    const AT_USERNAME = "phoenix-newtons";
    const AT_API_KEY = "atsk_f11a23cdbd597e52595a981c8002711787c1dc9a49b81e95dc1dfebd4b6923a5f1e07a69";
    const VERIFY_OTP_URL = "https://nzsbvtepxuqheebdwtei.supabase.co/functions/v1/verify-otp";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const loginBtn = document.getElementById('loginBtn');
      let phone = document.getElementById('phone').value.trim();
      const countryCode = document.getElementById('countryCode').value;

      // Format phone number: remove leading 0 if present[span_3](start_span)[span_3](end_span)
      const formattedPhone = countryCode.replace('+', '') + phone.replace(/^0/, '');
      
      loginBtn.innerText = "Sending...";
      loginBtn.disabled = true;

      try {
        // Step 1: Send SMS via Africa's Talking[span_4](start_span)[span_4](end_span)
        const response = await fetch('https://api.africastalking.com/version1/messaging', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/x-www-form-urlencoded',
            'apiKey': AT_API_KEY
          },
          body: new URLSearchParams({
            username: AT_USERNAME,
            to: '+' + formattedPhone,
            message: `Your E-Buy Uganda verification code is: 123456.`
          })
        });

        // Step 2: Request OTP from user[span_5](start_span)[span_5](end_span)
        const userOtp = prompt("Enter the 6-digit OTP sent to your phone:");
        if (!userOtp) {
          loginBtn.innerText = "Send OTP via SMS";
          loginBtn.disabled = false;
          return;
        }

        // Step 3: Verify OTP via Supabase Edge Function[span_6](start_span)[span_6](end_span)
        const verifyResponse = await fetch(VERIFY_OTP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: formattedPhone, otp: userOtp })
        });

        const result = await verifyResponse.json();

        if (result.success) {
          alert("✅ Login Successful!");
          window.location.href = "buyer-dashboard.html";
        } else {
          alert(result.error || "Invalid OTP. Please try again.");
          loginBtn.innerText = "Send OTP via SMS";
          loginBtn.disabled = false;
        }

      } catch (error) {
        console.error(error);
        alert("Something went wrong. Please check your network and try again.");
        loginBtn.innerText = "Send OTP via SMS";
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
