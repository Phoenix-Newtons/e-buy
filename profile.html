<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>console.warn = function() {};</script>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden min-h-screen">

  <!-- Mobile Navigation Menu Overlay Drawer -->
  <div id="mobileMenuDrawer" class="fixed inset-0 bg-green-700 z-[100] transform -translate-y-full transition-transform duration-300 ease-in-out flex flex-col md:hidden">
    <div class="flex justify-between items-center px-4 py-4 bg-green-800">
      <div class="flex items-center gap-3 text-white">
        <i class="fa-solid fa-store text-2xl"></i>
        <h1 class="text-2xl font-bold tracking-tight">E-Buy Uganda</h1>
      </div>
      <button id="menuCloseBtn" class="text-white hover:text-gray-200 focus:outline-none transition-transform active:scale-90">
        <i class="fa-solid fa-xmark text-3xl"></i>
      </button>
    </div>

    <!-- Mobile Drawer Links -->
    <div class="flex flex-col px-6 py-8 space-y-6 text-white text-lg font-bold tracking-wide">
      <a href="buyer-dashboard.html" class="hover:text-green-200 transition-colors"><i class="fa-solid fa-house w-8"></i> Home</a>
      <a href="#" class="hover:text-green-200 transition-colors"><i class="fa-solid fa-th-large w-8"></i> Categories</a>
      <a href="my-orders.html" class="hover:text-green-200 transition-colors"><i class="fa-solid fa-bag-shopping w-8"></i> My Orders</a>
      <a href="buyer-messages.html" class="hover:text-green-200 transition-colors"><i class="fa-solid fa-message w-8"></i> Messages</a>
      <a href="profile.html" class="text-yellow-300 transition-colors"><i class="fa-solid fa-user w-8"></i> Profile</a>
      <hr class="border-green-600">
      <button onclick="logout()" class="text-left text-red-300 hover:text-red-100 transition-colors"><i class="fa-solid fa-right-from-bracket w-8"></i> Logout</button>
    </div>
  </div>

  <!-- Top Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50 shadow-sm" id="mainNav">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold hidden sm:block">E-Buy Uganda</h1>
      </div>
      
      <!-- Central Empty Space for alignment -->
      <div class="flex-1 max-w-xl mx-8 hidden md:block"></div>

      <!-- Right Action Icons -->
      <div class="flex items-center gap-5 sm:gap-6">
        <a href="buyer-dashboard.html" class="hover:text-yellow-300 transition hidden sm:block" title="Home"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="buyer-messages.html" class="hover:text-yellow-300 transition hidden sm:block" title="Messages"><i class="fa-solid fa-message text-xl"></i></a>
        <a href="my-orders.html" class="hover:text-yellow-300 transition hidden sm:block" title="My Orders"><i class="fa-solid fa-bag-shopping text-xl"></i></a>
        
        <!-- Profile Dropdown (Desktop) -->
        <div class="relative hidden sm:block">
          <button onclick="toggleProfileMenu()" class="flex items-center gap-3 cursor-pointer focus:outline-none hover:opacity-90">
            <div class="w-9 h-9 bg-white text-green-600 rounded-full flex items-center justify-center font-bold shadow-sm ring-2 ring-yellow-300">JM</div>
          </button>
          <!-- Dropdown -->
          <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl py-2 border border-gray-100 z-50">
            <a href="profile.html" class="block px-4 py-2 text-green-600 bg-green-50 transition font-medium"><i class="fa-solid fa-user w-5"></i> Profile</a>
            <a href="my-orders.html" class="block px-4 py-2 text-gray-700 hover:bg-green-50 hover:text-green-600 transition"><i class="fa-solid fa-bag-shopping w-5"></i> My Orders</a>
            <hr class="my-1 border-gray-100">
            <button onclick="logout()" class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-right-from-bracket w-5"></i> Logout</button>
          </div>
        </div>

        <!-- Hamburger Icon (Mobile) -->
        <button id="menuOpenBtn" class="md:hidden text-white focus:outline-none hover:opacity-80 transition active:scale-90">
          <i class="fa-solid fa-bars text-2xl"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8 flex gap-8">
    <!-- Desktop Sidebar -->
    <div class="hidden md:block w-64 bg-white rounded-3xl shadow-sm border border-gray-100 p-6 h-fit sticky top-24" id="sidebar">
      <div class="space-y-4">
        <a href="buyer-dashboard.html" class="flex items-center gap-3 text-gray-600 hover:text-green-600 hover:bg-green-50 px-4 py-3 rounded-2xl transition"><i class="fa-solid fa-house w-5"></i> Home</a>
        <a href="#" class="flex items-center gap-3 text-gray-600 hover:text-green-600 hover:bg-green-50 px-4 py-3 rounded-2xl transition"><i class="fa-solid fa-th-large w-5"></i> Categories</a>
        <a href="my-orders.html" class="flex items-center gap-3 text-gray-600 hover:text-green-600 hover:bg-green-50 px-4 py-3 rounded-2xl transition"><i class="fa-solid fa-bag-shopping w-5"></i> My Orders</a>
        <a href="buyer-messages.html" class="flex items-center gap-3 text-gray-600 hover:text-green-600 hover:bg-green-50 px-4 py-3 rounded-2xl transition"><i class="fa-solid fa-message w-5"></i> Messages</a>
        <hr class="border-gray-100 my-2">
        <a href="profile.html" class="flex items-center gap-3 text-green-600 font-bold bg-green-50 px-4 py-3 rounded-2xl transition"><i class="fa-solid fa-user w-5"></i> My Profile</a>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 min-w-0">
      <h1 class="text-2xl md:text-3xl font-bold mb-6 text-gray-800">Account Settings</h1>

      <!-- Profile Header Card -->
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 sm:p-8 mb-6 flex flex-col sm:flex-row items-center gap-6">
        <div class="relative group cursor-pointer">
          <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl font-black shadow-sm group-hover:opacity-80 transition">
            JM
          </div>
          <div class="absolute bottom-0 right-0 bg-green-600 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
            <i class="fa-solid fa-camera text-sm"></i>
          </div>
        </div>
        <div class="text-center sm:text-left flex-1">
          <h2 class="text-2xl font-bold text-gray-800">John Mason</h2>
          <p class="text-gray-500 mb-2">john.mason@example.com</p>
          <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-sm font-bold border border-blue-100">Buyer Account</span>
        </div>
        <button class="text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl font-medium transition text-sm hidden sm:block" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket mr-1"></i> Log out
        </button>
      </div>

      <!-- Personal Information Form -->
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 sm:p-8 mb-6">
        <h3 class="text-xl font-bold text-gray-800 mb-5"><i class="fa-regular fa-address-card mr-2 text-green-600"></i> Personal Information</h3>
        
        <form id="profileForm" onsubmit="handleSave(event)">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
              <input type="text" value="John" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
              <input type="text" value="Mason" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
              <input type="email" value="john.mason@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
              <input type="tel" value="0771234567" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-2">Default Delivery Location</label>
              <div class="relative">
                <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" value="Ntinda, Kampala" class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
              </div>
            </div>
          </div>
          
          <div class="flex justify-end">
            <button type="submit" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 transition active:scale-95 shadow-sm">
              Save Changes
            </button>
          </div>
        </form>
      </div>

      <!-- Account Security -->
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 sm:p-8">
        <h3 class="text-xl font-bold text-gray-800 mb-5"><i class="fa-solid fa-shield-halved mr-2 text-green-600"></i> Security</h3>
        
        <form onsubmit="event.preventDefault(); alert('Password reset link sent to your email!');">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
              <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
              <input type="password" placeholder="Enter new password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition text-gray-800">
            </div>
          </div>
          
          <div class="flex justify-start">
            <button type="submit" class="border-2 border-gray-200 text-gray-700 px-6 py-2.5 rounded-xl font-bold hover:bg-gray-50 transition active:scale-95">
              Update Password
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script>
    // --- UI Interactions (Drawer & Dropdown) ---
    const mobileMenuDrawer = document.getElementById('mobileMenuDrawer');
    document.getElementById('menuOpenBtn').addEventListener('click', () => {
      mobileMenuDrawer.classList.remove('-translate-y-full');
      document.body.style.overflow = 'hidden';
    });
    document.getElementById('menuCloseBtn').addEventListener('click', () => {
      mobileMenuDrawer.classList.add('-translate-y-full');
      document.body.style.overflow = '';
    });

    function toggleProfileMenu() {
      document.getElementById('profileDropdown').classList.toggle('hidden');
    }

    // Close dropdown when clicking outside
    window.onclick = function(event) {
      if (!event.target.closest('.relative')) {
        const dropdown = document.getElementById('profileDropdown');
        if (dropdown && !dropdown.classList.contains('hidden')) {
          dropdown.classList.add('hidden');
        }
      }
    }

    function logout() {
      if(confirm("Are you sure you want to log out?")) {
        window.location.href = "login.html";
      }
    }

    // Handle Form Save
    function handleSave(event) {
      event.preventDefault();
      
      // Change button text to show feedback
      const btn = event.target.querySelector('button[type="submit"]');
      const originalText = btn.innerText;
      
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Saved!';
      btn.classList.replace('bg-green-600', 'bg-emerald-500');
      
      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.replace('bg-emerald-500', 'bg-green-600');
      }, 2000);
    }
  </script>
</body>
</html>
