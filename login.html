<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="index.html" class="hover:underline">Home</a>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold">Login</h2>
        <p class="text-gray-600 mt-2">Enter your MTN or Airtel number</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-1">Phone Number</label>
          <div class="flex gap-2">
            <select id="countryCode" class="px-4 py-3 border border-gray-300 rounded-2xl w-28">
              <option>+256</option>
            </select>
            <input type="tel" id="phone" required placeholder="700 123 456"
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500">
          </div>
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl">
          Send OTP via SMS
        </button>
      </form>
    </div>
  </div>

  <script>
    // === YOUR AFRICA'S TALKING CREDENTIALS ===
    const AT_USERNAME = "phoenix-newtons";
    const AT_API_KEY = "atsk_f11a23cdbd597e52595a981c8002711787c1dc9a49b81e95dc1dfebd4b6923a5f1e07a69";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let phone = document.getElementById('phone').value.trim();
      const countryCode = document.getElementById('countryCode').value;

      if (!phone) {
        alert("Please enter your phone number");
        return;
      }

      // Format to international format
      phone = countryCode.replace('+', '') + phone.replace(/^0/, '');

      alert(`Sending OTP to +${phone}...`);

      try {
        const response = await fetch('https://api.africastalking.com/version1/messaging', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/x-www-form-urlencoded',
            'apiKey': AT_API_KEY
          },
          body: new URLSearchParams({
            username: AT_USERNAME,
            to: '+' + phone,
            message: `Your E-Buy Uganda verification code is: 123456. Valid for 5 minutes.`
          })
        });

        const data = await response.text();
        console.log(data);
        
        alert("✅ OTP Sent Successfully!\n\nDemo Code: 123456\n\nIn production you will receive a real SMS.");

      } catch (error) {
        console.error(error);
        alert("Failed to send SMS. Please check your Africa's Talking balance or credentials.");
      }
    });
  </script>
</body>
</html>
