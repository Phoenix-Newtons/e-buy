<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    console.warn = function() {};
  </script>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="index.html" class="hover:underline">Home</a>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
      
      <div class="text-center mb-8">
        <i class="fa-solid fa-right-to-bracket text-5xl text-green-600 mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
        <p class="text-gray-600 mt-2">Login with your email</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500"
                 placeholder="your@email.com">
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
          Send Login OTP
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        Don't have an account? 
        <a href="buyer-register.html" class="text-green-600 font-semibold hover:underline">Sign Up</a>
      </p>

      <div class="text-center mt-8 text-xs text-gray-400">
        Secured with Supabase • MTN & Airtel Uganda
      </div>
    </div>
  </div>

  <script>
    // === YOUR SUPABASE CONFIG ===
    const supabaseUrl = 'https://nzsbvtepxuqheebdwtei.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56c2J2dGVweHVxaGVlYmR3dGVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjc2NzgsImV4cCI6MjA5NjcwMzY3OH0.WZ5_6yX_pmHpO4DU4rtQpKgFXCSZrhVSi6CzaEYTWus';

    const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      if (!email) {
        alert("Please enter your email address");
        return;
      }

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: 'https://phoenix-newtons.github.io/e-buy/buyer-dashboard.html'
        }
      });

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert(`✅ Login OTP sent to ${email}\n\nPlease check your inbox (and spam folder) for the code.`);
      }
    });
  </script>
</body>
</html>
