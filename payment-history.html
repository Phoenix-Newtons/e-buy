<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment History - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    // Suppress Tailwind CDN warning
    console.warn = function() {};
  </script>
</head>
  <nav class="bg-green-600 dark:bg-gray-900 text-white py-4 sticky top-0 z-50 transition-colors">
  <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-store text-3xl"></i>
      <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
    </div>

    <!-- Dark Mode Toggle -->
    <button onclick="toggleDarkMode()" 
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/20 transition">
      <i id="themeIcon" class="fa-solid fa-moon text-xl"></i>
    </button>
  </div>
</nav>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="buyer-dashboard.html" class="hover:underline">← Back to Dashboard</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">Payment History</h1>
      <div class="text-sm text-gray-500">
        All transactions via MTN & Airtel
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-50 border-b">
          <tr>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Date</th>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Item</th>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Seller</th>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Amount</th>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Status</th>
            <th class="text-left py-5 px-8 font-medium text-gray-600">Payment Method</th>
          </tr>
        </thead>
        <tbody id="paymentTable" class="divide-y">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

    <div class="mt-8 text-center text-sm text-gray-500">
      All payments are secured with 2-Factor Verification
    </div>
  </div>

  <script>
    const payments = [
      {
        date: "June 05, 2026",
        item: "iPhone 13 - 128GB",
        seller: "Mukisa Electronics",
        amount: "1,215,000",
        status: "Completed",
        method: "MTN Mobile Money"
      },
      {
        date: "June 03, 2026",
        item: "Fresh Tomatoes 50kg",
        seller: "Mama Sarah Sales",
        amount: "135,000",
        status: "Completed",
        method: "Airtel Money"
      },
      {
        date: "May 28, 2026",
        item: "Wooden Dining Table",
        seller: "Gulu Furniture",
        amount: "465,000",
        status: "Completed",
        method: "MTN Mobile Money"
      }
    ];

    function createPaymentRow(payment) {
      const statusClass = payment.status === "Completed" ? 
        "text-green-600 bg-green-100" : "text-amber-600 bg-amber-100";
      
      const row = document.createElement('tr');
      row.className = "hover:bg-gray-50 transition";
      row.innerHTML = `
        <td class="py-6 px-8 text-gray-600">${payment.date}</td>
        <td class="py-6 px-8 font-medium">${payment.item}</td>
        <td class="py-6 px-8 text-gray-600">${payment.seller}</td>
        <td class="py-6 px-8 font-bold text-green-600">UGX ${payment.amount}</td>
        <td class="py-6 px-8">
          <span class="px-4 py-1 rounded-full text-sm font-medium ${statusClass}">
            ${payment.status}
          </span>
        </td>
        <td class="py-6 px-8 text-gray-600">${payment.method}</td>
      `;
      return row;
    }

    window.onload = function() {
      const tbody = document.getElementById('paymentTable');
      payments.forEach(payment => {
        tbody.appendChild(createPaymentRow(payment));
      });
    };
  </script>
</body>
</html>
