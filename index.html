<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Buy Uganda - Browse Goods</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    // Suppress Tailwind warnings in development console environment
    console.warn = function() {};
  </script>
</head>
<body class="bg-gray-100 font-sans min-h-screen text-gray-800 overflow-x-hidden">

  <!-- Mobile Navigation Menu Overlay Drawer -->
  <div id="mobileMenuDrawer" class="fixed inset-0 bg-[#168838] z-[100] transform -translate-y-full transition-transform duration-300 ease-in-out flex flex-col">
    
    <!-- Drawer Header Menu Top Bar -->
    <div class="flex justify-between items-center px-4 py-4 bg-[#147a32]">
      <div class="flex items-center gap-3 text-white">
        <i class="fa-solid fa-shop text-2xl"></i>
        <h1 class="text-2xl font-bold tracking-tight">E-Buy Uganda</h1>
      </div>
      <button id="menuCloseBtn" class="text-white hover:text-gray-200 focus:outline-none transition-transform active:scale-90">
        <i class="fa-solid fa-xmark text-3xl"></i>
      </button>
    </div>

    <!-- Interactive Navigation Text Links -->
    <div class="flex flex-col px-4 py-6 space-y-6 text-white text-lg font-bold tracking-wide">
      <a href="index.html" class="hover:text-green-200 transition-colors">Home</a>
      <a href="#" class="hover:text-green-200 transition-colors">Search</a>
      <a href="login.html" class="hover:text-green-200 transition-colors">Login</a>
    </div>

    <!-- Primary User Pathway Action Call-to-Action Buttons -->
    <div class="px-4 space-y-4">
      <a href="#" class="block w-full bg-white text-[#168838] font-bold text-center py-3.5 rounded-xl text-lg hover:bg-gray-100 transition shadow-sm active:scale-95">
        Buyer
      </a>
      <a href="trader-dashboard.html" class="block w-full bg-yellow-400 text-green-900 font-bold text-center py-3.5 rounded-xl text-lg hover:bg-yellow-500 transition shadow-sm active:scale-95">
        Seller
      </a>
    </div>
  </div>

  <!-- Main Top Bar Header Navigation -->
  <nav class="bg-green-600 text-white py-4 px-4 sticky top-0 z-50 shadow-sm">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-shop text-2xl"></i>
        <h1 class="text-2xl font-bold tracking-tight">E-Buy Uganda</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- Replaced standalone gauge icon with functional hamburger trigger -->
        <button id="menuOpenBtn" class="text-white focus:outline-none hover:opacity-80 transition active:scale-90">
          <i class="fa-solid fa-bars text-2xl"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Green Search Module Hero Banner Container Area -->
  <div class="bg-green-600 text-white pb-8 pt-4 px-4 shadow-md">
    <div class="max-w-md mx-auto space-y-4">
      
      <!-- Section Screen Heading Title Text -->
      <h2 class="text-2xl font-bold tracking-wide mb-2">Browse All Goods</h2>
      
      <!-- Primary Text Phrase Input Filtering Element Box -->
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input type="text" id="keywordSearch" 
               class="w-full pl-11 pr-4 py-3.5 rounded-2xl text-gray-800 focus:outline-none shadow-inner text-base" 
               placeholder="Search goods, traders, categories..">
      </div>

      <!-- Functional Select Box Filter Group: Categories Option Elements -->
      <div class="relative">
        <select id="categorySelect" 
                class="w-full bg-white appearance-none text-gray-700 px-5 py-3.5 rounded-2xl focus:outline-none shadow-sm cursor-pointer text-base">
          <option value="All">All Categories</option>
          <option value="Phones">Phones & Accessories</option>
          <option value="Electronics">Electronics & Appliances</option>
          <option value="Fashion">Fashion & Clothes</option>
        </select>
        <span class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-500">
          <i class="fa-solid fa-chevron-down text-sm"></i>
        </span>
      </div>

      <!-- Functional Select Box Filter Group: Product Conditions Option Elements -->
      <div class="relative">
        <select id="conditionSelect" 
                class="w-full bg-white appearance-none text-gray-700 px-5 py-3.5 rounded-2xl focus:outline-none shadow-sm cursor-pointer text-base">
          <option value="All">New & Used</option>
          <option value="New">Brand New</option>
          <option value="Used">Used Items</option>
        </select>
        <span class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-500">
          <i class="fa-solid fa-chevron-down text-sm"></i>
        </span>
      </div>

      <!-- Quick Action Search Button Trigger Interface Link -->
      <div class="flex items-center gap-2 pt-1 text-white opacity-95 font-medium cursor-pointer max-w-max hover:opacity-100 transition">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span class="text-base tracking-wide font-semibold">Search</span>
      </div>
      
    </div>
  </div>

  <!-- Content Results Control Section View Wrapper Block -->
  <main class="max-w-md mx-auto px-4 py-6">
    
    <!-- Top Result Controls Bar: Dynamic Item Count and View Mode Toggles -->
    <div class="flex justify-between items-center mb-6">
      <div class="text-gray-600 text-sm font-medium">
        <span id="resultsCount" class="font-extrabold text-gray-900 text-base">0</span> goods found
      </div>
      
      <div class="flex items-center gap-3">
        <!-- Sort Control Dropdown Selection Selection Box Element -->
        <div class="relative bg-white border border-gray-200 rounded-xl px-3 py-1.5 shadow-sm text-xs">
          <select id="sortSelect" class="bg-transparent appearance-none pr-5 focus:outline-none font-medium text-gray-700 cursor-pointer">
            <option value="relevance">Sort: Relevance</option>
            <option value="low-high">Price: Low to High</option>
            <option value="high-low">Price: High to Low</option>
          </select>
          <span class="absolute inset-y-0 right-2 flex items-center pointer-events-none text-gray-400">
            <i class="fa-solid fa-chevron-down text-[10px]"></i>
          </span>
        </div>

        <!-- View Display Mode Toggle Switch Button Blocks -->
        <div class="flex border border-gray-200 rounded-xl bg-white overflow-hidden shadow-sm text-xs">
          <button id="viewGridBtn" class="p-2 text-gray-400 hover:text-gray-600 transition focus:outline-none border-r border-gray-100">
            <i class="fa-solid fa-table-cells-large text-sm"></i>
          </button>
          <button id="viewListBtn" class="p-2 text-white bg-green-600 transition focus:outline-none">
            <i class="fa-solid fa-list-ul text-sm"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Active Feed Layout Loading Spinner State Component -->
    <div id="loadingFeed" class="flex flex-col items-center justify-center py-16 gap-3">
      <div class="w-9 h-9 border-4 border-green-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-400 text-xs font-medium">Retrieving catalog records...</p>
    </div>

    <!-- Empty Dataset Fallback Alert Message Element Container -->
    <div id="emptyFeed" class="hidden text-center py-16 bg-white rounded-2xl border p-6">
      <i class="fa-solid fa-box-open text-5xl text-gray-300 mb-3"></i>
      <h3 class="text-lg font-bold text-gray-700 mb-1">No matches found</h3>
      <p class="text-sm text-gray-400">Try modifying your filter settings or search terms.</p>
    </div>

    <!-- Interactive Data Content Output Display Feed Grid/List Area -->
    <div id="catalogFeed" class="space-y-4 hidden">
      <!-- Items will be created and displayed here dynamically by JavaScript -->
    </div>

  </main>

  <!-- External Client Library SDK Script Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 1. Mobile Menu Overlay Logic Hooks
    const mobileMenuDrawer = document.getElementById('mobileMenuDrawer');
    const menuOpenBtn = document.getElementById('menuOpenBtn');
    const menuCloseBtn = document.getElementById('menuCloseBtn');

    // Trigger animation to slide menu down into view
    menuOpenBtn.addEventListener('click', () => {
      mobileMenuDrawer.classList.remove('-translate-y-full');
      document.body.style.overflow = 'hidden'; // Prevent background scrolling when menu is open
    });

    // Trigger animation to slide menu up out of view
    menuCloseBtn.addEventListener('click', () => {
      mobileMenuDrawer.classList.add('-translate-y-full');
      document.body.style.overflow = ''; // Restore background scrolling
    });


    // 2. Safe Application Global Storage Instantiation Wrapper Context Setup
    if (!window.mySupabase) {
      window.mySupabase = supabase.createClient(
        'https://nzsbvtepxuqheebdwtei.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56c2J2dGVweHVxaGVlYmR3dGVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjc2NzgsImV4cCI6MjA5NjcwMzY3OH0.WZ5_6yX_pmHpO4DU4rtQpKgFXCSZrhVSi6CzaEYTWus'
      );
    }

    // Stateful core layout variables
    let rawInventoryData = [];
    let activeLayoutFormat = 'list'; 

    // 3. Fetch Catalog Inventory List Records Context Object Method
    async function loadInventoryItems() {
      try {
        const { data, error } = await window.mySupabase
          .from('products')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        rawInventoryData = data || [];
        processAndRenderCatalog();

      } catch (err) {
        console.error("Database connection fault tracking detail logs:", err);
        document.getElementById('loadingFeed').innerHTML = `
          <p class="text-red-500 font-medium text-sm text-center">
            <i class="fa-solid fa-triangle-exclamation mr-1"></i> Sync broken. Please try reloading the dashboard page.
          </p>`;
      }
    }

    // 4. Process Content Rendering Mechanics
    function processAndRenderCatalog() {
      const loadingFeed = document.getElementById('loadingFeed');
      const emptyFeed = document.getElementById('emptyFeed');
      const catalogFeed = document.getElementById('catalogFeed');
      const resultsCount = document.getElementById('resultsCount');

      loadingFeed.classList.add('hidden');

      // Filter local references on key inputs
      const searchWord = document.getElementById('keywordSearch').value.toLowerCase().trim();
      const conditionFilter = document.getElementById('conditionSelect').value;

      let runtimeDisplayList = rawInventoryData.filter(item => {
        const textMatch = !searchWord || 
                          (item.title || '').toLowerCase().includes(searchWord) || 
                          (item.description || '').toLowerCase().includes(searchWord) || 
                          (item.location || '').toLowerCase().includes(searchWord);

        let itemCondition = 'Used'; 
        if ((item.title + ' ' + item.description).toLowerCase().includes('new') || (item.title + ' ' + item.description).toLowerCase().includes('sealed')) {
          itemCondition = 'New';
        }

        const conditionMatch = conditionFilter === 'All' || itemCondition === conditionFilter;

        return textMatch && conditionMatch;
      });

      // Sort calculation processing
      const sortValue = document.getElementById('sortSelect').value;
      if (sortValue === 'low-high') {
        runtimeDisplayList.sort((a, b) => parseFloat(a.price || 0) - parseFloat(b.price || 0));
      } else if (sortValue === 'high-low') {
        runtimeDisplayList.sort((a, b) => parseFloat(b.price || 0) - parseFloat(a.price || 0));
      }

      resultsCount.innerText = runtimeDisplayList.length;

      if (runtimeDisplayList.length === 0) {
        catalogFeed.classList.add('hidden');
        emptyFeed.classList.remove('hidden');
        return;
      }

      emptyFeed.classList.add('hidden');
      catalogFeed.classList.remove('hidden');

      if (activeLayoutFormat === 'grid') {
        catalogFeed.className = "grid grid-cols-2 gap-3 space-y-0";
      } else {
        catalogFeed.className = "space-y-3";
      }

      catalogFeed.innerHTML = '';

      runtimeDisplayList.forEach(item => {
        let coverImgSource = 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400&auto=format&fit=crop&q=60';
        try {
          if (item.image_url) {
            const parsedArray = JSON.parse(item.image_url);
            if (Array.isArray(parsedArray) && parsedArray.length > 0) {
              coverImgSource = parsedArray[0];
            }
          }
        } catch(e) {
          if (typeof item.image_url === 'string' && item.image_url.startsWith('http')) {
            coverImgSource = item.image_url;
          }
        }

        let labelTagText = 'USED';
        let labelTagColorClass = 'bg-orange-500 text-white text-[10px]';
        if ((item.title + ' ' + item.description).toLowerCase().includes('new') || (item.title + ' ' + item.description).toLowerCase().includes('sealed')) {
          labelTagText = 'NEW';
          labelTagColorClass = 'bg-blue-500 text-white text-[10px]';
        }

        const rawPhoneText = (item.whatsapp || '').trim().replace(/^0/, '');
        const outMessageGreeting = `Hello, I'm interested in buying your item "${item.title}" listed on E-Buy Uganda. Is it available?`;
        const actionWhatsAppLink = `https://wa.me/256${rawPhoneText}?text=${encodeURIComponent(outMessageGreeting)}`;

        const cardItemBox = document.createElement('div');

        if (activeLayoutFormat === 'grid') {
          cardItemBox.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col relative";
          cardItemBox.innerHTML = `
            <div class="relative w-full aspect-square bg-gray-50 overflow-hidden">
              <img src="${coverImgSource}" alt="${item.title}" class="w-full h-full object-cover">
              <span class="absolute top-2 left-2 px-2 py-0.5 rounded-md font-black tracking-wider shadow-sm ${labelTagColorClass}">
                ${labelTagText}
              </span>
            </div>
            <div class="p-3 flex-1 flex flex-col justify-between gap-1">
              <div>
                <h4 class="font-bold text-gray-800 text-sm line-clamp-1 leading-tight">${item.title}</h4>
                <p class="text-[11px] text-gray-400 font-medium flex items-center gap-0.5 mt-0.5">
                  <i class="fa-solid fa-location-dot"></i> ${item.location || 'Uganda'}
                </p>
                <div class="text-sm font-extrabold text-green-600 mt-1">
                  ${parseFloat(item.price || 0).toLocaleString()} <span class="text-[10px] font-bold">UGX</span>
                </div>
              </div>
              <a href="${actionWhatsAppLink}" target="_blank" class="w-full mt-2 bg-emerald-500 text-white font-bold py-2 rounded-xl text-xs text-center flex items-center justify-center gap-1.5 transition active:scale-95">
                <i class="fa-brands fa-whatsapp text-sm"></i> Chat
              </a>
            </div>
          `;
        } else {
          cardItemBox.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden p-3 flex gap-3 relative";
          cardItemBox.innerHTML = `
            <div class="relative w-24 h-24 rounded-xl overflow-hidden bg-gray-50 flex-shrink-0">
              <img src="${coverImgSource}" alt="${item.title}" class="w-full h-full object-cover">
              <span class="absolute top-1 left-1 px-1.5 py-0.5 rounded font-black text-[9px] tracking-wider shadow-sm ${labelTagColorClass}">
                ${labelTagText}
              </span>
            </div>
            <div class="flex-1 flex flex-col justify-between py-0.5">
              <div class="space-y-0.5">
                <h4 class="font-bold text-gray-900 text-base line-clamp-1 leading-tight pr-4">${item.title}</h4>
                <p class="text-xs text-gray-400 font-medium flex items-center gap-1">
                  <i class="fa-solid fa-location-dot text-gray-400"></i> ${item.location || 'Kampala'}
                </p>
                <div class="text-base font-extrabold text-green-600 pt-0.5">
                  ${parseFloat(item.price || 0).toLocaleString()} <span class="text-xs font-bold">UGX</span>
                </div>
              </div>
              
              <div class="flex justify-between items-center mt-1">
                <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-gray-100 text-gray-500 border border-gray-200">
                  <i class="fa-solid fa-truck-fast"></i> ${item.delivery_mode || 'Delivery'}
                </span>
                <a href="${actionWhatsAppLink}" target="_blank" class="bg-emerald-500 text-white font-bold px-4 py-1.5 rounded-xl text-xs flex items-center gap-1 transition active:scale-95 shadow-sm">
                  <i class="fa-brands fa-whatsapp"></i> Buy
                </a>
              </div>
            </div>
          `;
        }

        catalogFeed.appendChild(cardItemBox);
      });
    }

    // 5. Input Operational Event Watchers Hookup Routines
    document.getElementById('keywordSearch').addEventListener('input', processAndRenderCatalog);
    document.getElementById('categorySelect').addEventListener('change', processAndRenderCatalog);
    document.getElementById('conditionSelect').addEventListener('change', processAndRenderCatalog);
    document.getElementById('sortSelect').addEventListener('change', processAndRenderCatalog);

    document.getElementById('viewGridBtn').addEventListener('click', () => {
      activeLayoutFormat = 'grid';
      document.getElementById('viewGridBtn').className = "p-2 text-white bg-green-600 transition focus:outline-none";
      document.getElementById('viewListBtn').className = "p-2 text-gray-400 hover:text-gray-600 transition focus:outline-none border-r border-gray-100";
      processAndRenderCatalog();
    });

    document.getElementById('viewListBtn').addEventListener('click', () => {
      activeLayoutFormat = 'list';
      document.getElementById('viewListBtn').className = "p-2 text-white bg-green-600 transition focus:outline-none";
      document.getElementById('viewGridBtn').className = "p-2 text-gray-400 hover:text-gray-600 transition focus:outline-none border-r border-gray-100";
      processAndRenderCatalog();
    });

    // Run Initial Load Script execution sequence entry point context logic loop
    window.addEventListener('DOMContentLoaded', loadInventoryItems);
  </script>
</body>
</html>
