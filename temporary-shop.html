<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mama Sarah Sales - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>console.warn = function() {};</script>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="buyer-dashboard.html" class="hover:underline">← Back to Browse</a>
    </div>
  </nav>

  <!-- Shop Header -->
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-8">
      <div class="flex flex-col md:flex-row gap-6 items-start">
        <div class="w-28 h-28 bg-amber-100 rounded-3xl flex items-center justify-center text-6xl flex-shrink-0">🛍️</div>
        
        <div class="flex-1">
          <div class="flex items-center gap-3">
            <h1 class="text-4xl font-bold">Mama Sarah Sales</h1>
            <span class="bg-amber-100 text-amber-700 text-sm px-4 py-1 rounded-full font-medium">Temporary Seller</span>
          </div>
          <div class="flex items-center gap-4 mt-2 text-gray-600">
            <span><i class="fa-solid fa-location-dot"></i> Gulu Town</span>
            <span><i class="fa-solid fa-clock text-amber-500"></i> Temporary Shop</span>
          </div>
          <p class="mt-4 text-gray-700">Fresh produce, clothes & household items • Selling fast today!</p>
        </div>

        <button onclick="contactTrader()" 
                class="bg-green-600 text-white px-8 py-4 rounded-3xl flex items-center gap-3 hover:bg-green-700 text-lg font-semibold">
          <i class="fa-brands fa-whatsapp text-2xl"></i> Chat on WhatsApp
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-10">
    
    <!-- Improved Real-time Search -->
    <div class="max-w-xl mx-auto mb-8">
      <input type="text" id="shopSearch" 
             onkeyup="performShopSearch()"
             class="w-full px-6 py-4 rounded-3xl border border-gray-300 focus:outline-none focus:border-green-500 text-lg"
             placeholder="Search tomatoes, sofa, dresses, rice...">
    </div>

    <!-- Warning Banner -->
    <div class="bg-amber-100 border border-amber-300 rounded-3xl p-4 mb-8 text-center">
      <p class="text-amber-800 font-medium">⏰ This is a Temporary Shop • Listings available for limited time only</p>
    </div>

    <h2 class="text-2xl font-semibold mb-6">Available Listings</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="shopProducts"></div>
  </div>

  <script>
    let allShopProducts = [
      { title: "Fresh Tomatoes - 50kg", price: "120,000", image: "🍅", status: "Fresh Today" },
      { title: "Second Hand Sofa Set", price: "350,000", image: "🛋️", status: "Good Condition" },
      { title: "Ladies Summer Dresses", price: "65,000", image: "👗", status: "Various Sizes" },
      { title: "Rice - 25kg Bag", price: "95,000", image: "🍚", status: "Wholesale" },
      { title: "Used Bicycle", price: "180,000", image: "🚲", status: "Well Maintained" },
      { title: "Fresh Beans - 30kg", price: "85,000", image: "🫘", status: "Farm Fresh" }
    ];

    function createProductCard(product) {
      const card = document.createElement('div');
      card.className = "bg-white rounded-3xl shadow hover:shadow-xl transition overflow-hidden cursor-pointer";
      card.innerHTML = `
        <div class="h-52 bg-gray-100 flex items-center justify-center text-7xl border-b" onclick="viewProduct('${product.title}')">
          ${product.image}
        </div>
        <div class="p-5">
          <h3 class="font-semibold text-lg">${product.title}</h3>
          <p class="text-green-600 font-bold text-2xl mt-2">UGX ${product.price}</p>
          <p class="text-sm text-amber-600 mt-1">${product.status}</p>
          
          <button onclick="contactTrader(); event.stopImmediatePropagation()" 
                  class="mt-5 w-full bg-green-600 text-white py-3 rounded-2xl hover:bg-green-700 transition">
            Contact Seller
          </button>
        </div>
      `;
      return card;
    }

    function renderShopProducts(products) {
      const container = document.getElementById('shopProducts');
      container.innerHTML = '';
      products.forEach(p => container.appendChild(createProductCard(p)));
    }

    function performShopSearch() {
      const query = document.getElementById('shopSearch').value.toLowerCase().trim();
      
      if (!query) {
        renderShopProducts(allShopProducts);
        return;
      }

      const filtered = allShopProducts.filter(product => 
        product.title.toLowerCase().includes(query) ||
        product.status.toLowerCase().includes(query)
      );

      renderShopProducts(filtered);
    }

    function viewProduct(title) {
      alert(`Opening product: ${title}`);
      // window.location.href = 'product-detail.html';
    }

    function contactTrader() {
      alert("✅ Opening WhatsApp to Mama Sarah Sales\nNumber: +256 777 987 654");
    }

    // Initialize
    window.onload = () => renderShopProducts(allShopProducts);
  </script>
</body>
</html>
