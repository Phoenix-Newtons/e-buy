<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as Trader - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <a href="index.html" class="hover:underline">Home</a>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8">
      
      <div class="text-center mb-8">
        <i class="fa-solid fa-shop text-5xl text-green-600 mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-800">Register as Trader</h2>
        <p class="text-gray-600 mt-2">Start selling today</p>
      </div>

      <!-- Trader Type Toggle -->
      <div class="flex bg-gray-100 rounded-2xl p-1 mb-8">
        <button onclick="selectType(0)" id="permanentBtn"
                class="flex-1 py-3 rounded-xl font-semibold transition bg-green-600 text-white">Permanent Trader</button>
        <button onclick="selectType(1)" id="temporaryBtn"
                class="flex-1 py-3 rounded-xl font-semibold transition">Temporary Seller</button>
      </div>

      <form id="traderRegisterForm" class="space-y-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Shop / Business Name</label>
          <input type="text" id="shopName" required 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500" 
                 placeholder="Mukisa Electronics">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number <span class="text-red-500">*</span></label>
          <div class="flex gap-2">
            <select id="countryCode" class="px-4 py-3 border border-gray-300 rounded-2xl w-28">
              <option>+256</option>
            </select>
            <input type="tel" id="phone" required 
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500" 
                   placeholder="700 123 456">
          </div>
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
          Send OTP via SMS
        </button>
      </form>
    </div>
  </div>

  <script>
    let traderType = 0;

    function selectType(type) {
      traderType = type;
      const permanentBtn = document.getElementById('permanentBtn');
      const temporaryBtn = document.getElementById('temporaryBtn');

      if (type === 0) {
        permanentBtn.classList.add('bg-green-600', 'text-white');
        temporaryBtn.classList.remove('bg-green-600', 'text-white');
      } else {
        permanentBtn.classList.remove('bg-green-600', 'text-white');
        temporaryBtn.classList.add('bg-green-600', 'text-white');
      }
    }

    const AT_USERNAME = "phoenix-newtons";
    const AT_API_KEY = "atsk_f11a23cdbd597e52595a981c8002711787c1dc9a49b81e95dc1dfebd4b6923a5f1e07a69";

    document.getElementById('traderRegisterForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      let phone = document.getElementById('phone').value.trim();
      const countryCode = document.getElementById('countryCode').value;

      if (!phone) {
        alert("Please enter your phone number");
        return;
      }

      phone = countryCode.replace('+', '') + phone.replace(/^0/, '');

      alert(`Sending OTP to +${phone}...`);

      try {
        await fetch('https://api.africastalking.com/version1/messaging', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/x-www-form-urlencoded',
            'apiKey': AT_API_KEY
          },
          body: new URLSearchParams({
            username: AT_USERNAME,
            to: '+' + phone,
            message: `Your E-Buy Uganda verification code is: ${Math.floor(100000 + Math.random() * 900000)}. Valid for 5 minutes.`
          })
        });

        const userOtp = prompt("Enter the 6-digit OTP sent to your phone:");

        if (!userOtp) return;

        const verifyResponse = await fetch('https://nzsbvtepxuqheebdwtei.supabase.co/functions/v1/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phone, otp: userOtp })
        });

        const result = await verifyResponse.json();

        if (result.success) {
          const type = traderType === 0 ? "Permanent Trader" : "Temporary Seller";
          alert(`✅ Registration Successful as ${type}!`);
          window.location.href = traderType === 0 ? "trader-dashboard.html" : "temporary-trader-dashboard.html";
        } else {
          alert(result.error || "Invalid OTP. Please try again.");
        }

      } catch (error) {
        console.error(error);
        alert("Failed to send or verify OTP. Please check your Africa's Talking balance.");
      }
    });

    window.onload = () => selectType(0);
  </script>
</body>
</html>
