<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register as Trader - E-Buy Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    // Suppress Tailwind CDN warning
    console.warn = function() {};
  </script>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-green-600 text-white py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-store text-3xl"></i>
        <h1 class="text-2xl font-bold">E-Buy Uganda</h1>
      </div>
      <div class="flex items-center gap-4">
        <a href="index.html" class="hover:underline">Home</a>
        <a href="login.html" class="hover:underline">Login</a>
        <a href="buyer-register.html" class="hover:underline">Register as Buyer</a>
      </div>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8">
      
      <div class="text-center mb-8">
        <i class="fa-solid fa-shop text-5xl text-green-600 mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-800">Register as Trader</h2>
        <p class="text-gray-600 mt-2">Start selling today across Uganda</p>
      </div>

      <!-- Trader Type Toggle -->
      <div class="flex bg-gray-100 rounded-2xl p-1 mb-8">
        <button onclick="selectType(0)" id="permanentBtn"
                class="flex-1 py-3 rounded-xl font-semibold transition">Permanent Trader</button>
        <button onclick="selectType(1)" id="temporaryBtn"
                class="flex-1 py-3 rounded-xl font-semibold transition">Temporary Seller</button>
      </div>

      <form id="traderRegisterForm" class="space-y-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Shop / Business Name</label>
          <input type="text" id="shopName" required 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500" 
                 placeholder="Mukisa Electronics or Mama Sarah Sales">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number <span class="text-red-500">*</span></label>
          <div class="flex gap-2">
            <select class="px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500 w-28">
              <option>+256</option>
            </select>
            <input type="tel" id="phone" required 
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500" 
                   placeholder="700 123 456">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" required 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="confirmPassword" required 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-green-500">
        </div>

        <!-- Plan Info -->
        <div id="planInfo" class="bg-green-50 border border-green-200 rounded-2xl p-5 text-sm">
          <p class="font-semibold text-green-700">Permanent Plan - UGX 50,000 / month</p>
          <p class="text-green-600">Unlimited listings • Full shop • Monthly subscription via MTN/Airtel</p>
        </div>

        <!-- 2FA Notice -->
        <div class="bg-green-50 border border-green-200 rounded-2xl p-4 text-sm flex items-center gap-3">
          <i class="fa-solid fa-shield-halved text-green-600"></i>
          <p class="text-green-700 text-xs">2-Factor Verification will be enabled for your account</p>
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
          Create Trader Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        Already have an account? 
        <a href="login.html" class="text-green-600 font-semibold hover:underline">Login here</a>
      </p>
    </div>
  </div>

  <script>
    let traderType = 0; // 0 = Permanent, 1 = Temporary

    function selectType(type) {
      traderType = type;
      const permanentBtn = document.getElementById('permanentBtn');
      const temporaryBtn = document.getElementById('temporaryBtn');
      const planInfo = document.getElementById('planInfo');

      if (type === 0) {
        permanentBtn.classList.add('bg-green-600', 'text-white');
        temporaryBtn.classList.remove('bg-green-600', 'text-white');
        planInfo.innerHTML = `
          <p class="font-semibold text-green-700">Permanent Plan - UGX 50,000 / month</p>
          <p class="text-green-600">Unlimited listings • Full online shop • Monthly subscription</p>
        `;
      } else {
        permanentBtn.classList.remove('bg-green-600', 'text-white');
        temporaryBtn.classList.add('bg-green-600', 'text-white');
        planInfo.innerHTML = `
          <p class="font-semibold text-amber-700">Temporary Seller - Pay After Sale</p>
          <p class="text-amber-600">List for free • Service fee only when item is sold • Daily visibility</p>
        `;
      }
    }

    document.getElementById('traderRegisterForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return;
      }

      const type = traderType === 0 ? "Permanent Trader" : "Temporary Seller";
      
      alert(`✅ Registration Successful!\n\nWelcome to E-Buy Uganda!\n\nAccount Type: ${type}\n\nA 2-Factor Verification code has been sent to your phone.`);

      // Redirect to appropriate dashboard
      setTimeout(() => {
        window.location.href = traderType === 0 ? 'trader-dashboard.html' : 'temporary-trader-dashboard.html';
      }, 1500);
    });

    // Default selection
    window.onload = () => selectType(0);
  </script>
</body>
</html>
